name: 'Setup Gradle + Supabase'
description: 'Configures Gradle with Supabase credentials and caches dependencies'

inputs:
  supabase-url:
    description: 'Supabase project URL'
    required: false
    default: ''
  supabase-anon-key:
    description: 'Supabase anonymous key'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Configure Supabase credentials
      shell: bash
      run: |
        # Only overwrite gradle.properties if real secrets are provided
        # Otherwise keep existing gradle.properties (with placeholders from repo)
        if [ -n "${{ inputs.supabase-url }}" ] && [ -n "${{ inputs.supabase-anon-key }}" ]; then
          echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8" > gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "kotlin.code.style=official" >> gradle.properties
          echo "android.nonTransitiveRClass=true" >> gradle.properties
          echo "android.suppressUnsupportedCompileSdk=36" >> gradle.properties
          echo "SUPABASE_URL=${{ inputs.supabase-url }}" >> gradle.properties
          echo "SUPABASE_ANON_KEY=${{ inputs.supabase-anon-key }}" >> gradle.properties
          echo "ksp.useKSP2=false" >> gradle.properties
          echo "android.enableR8.fullMode=true" >> gradle.properties
          echo "✅ Real Supabase credentials configured"
        else
          echo "ℹ️ No real secrets provided - using existing gradle.properties from repo"
        fi

    - name: Cache Gradle
      uses: actions/cache@v5
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
