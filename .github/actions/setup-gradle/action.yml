name: 'Setup Gradle + Supabase'
description: 'Configures Gradle with Supabase credentials and caches dependencies'

inputs:
  supabase-url:
    description: 'Supabase project URL'
    required: false
    default: ''
  supabase-anon-key:
    description: 'Supabase anonymous key'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Configure Gradle properties
      shell: bash
      run: |
        # Always generate clean gradle.properties for CI (no org.gradle.java.home)
        echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8" > gradle.properties
        echo "android.useAndroidX=true" >> gradle.properties
        echo "kotlin.code.style=official" >> gradle.properties
        echo "android.nonTransitiveRClass=true" >> gradle.properties
        echo "android.suppressUnsupportedCompileSdk=36" >> gradle.properties
        echo "ksp.useKSP2=false" >> gradle.properties
        echo "android.enableR8.fullMode=true" >> gradle.properties

        # Add Supabase credentials if real secrets are provided
        if [ -n "${{ inputs.supabase-url }}" ] && [ -n "${{ inputs.supabase-anon-key }}" ]; then
          echo "SUPABASE_URL=${{ inputs.supabase-url }}" >> gradle.properties
          echo "SUPABASE_ANON_KEY=${{ inputs.supabase-anon-key }}" >> gradle.properties
        else
          echo "SUPABASE_URL=https://placeholder-dev.supabase.co" >> gradle.properties
          echo "SUPABASE_ANON_KEY=sb_publishable_placeholder_for_local_testing_only" >> gradle.properties
        fi

    - name: Cache Gradle
      uses: actions/cache@v5
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
