name: Tests Unitarios

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]

env:
  JAVA_VERSION: '17'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Forzar Node.js 24 para testing

jobs:
  test:
    name: Ejecutar Tests Unitarios
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar código del repositorio
    - name: Checkout del código
      uses: actions/checkout@v4.2.0  # ✅ Node.js 24

    # 2. Configurar Java 17
    - name: Configurar JDK 17
      uses: actions/setup-java@v4.0.0  # ✅ Node.js 24
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'

    # 3. Cache de dependencias de Gradle (acelera builds futuros)
    - name: Cache de Gradle
      uses: actions/cache@v4.0.0  # ✅ Node.js 24
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          gradle-${{ runner.os }}-

    # 4. Dar permisos de ejecución al Gradle Wrapper
    - name: Dar permisos a Gradle Wrapper
      run: chmod +x gradlew

    # 5. Ejecutar tests unitarios CON TODOS LOS WARNINGS Y ERRORES
    - name: Ejecutar Tests Unitarios (Verbose)
      run: |
        echo "=== INICIANDO TESTS CON TODOS LOS WARNINGS Y ERRORES ==="
        echo "Gradle version: $(./gradlew --version | grep Gradle)"
        echo ""
        echo "=== Ejecutando tests con --warning-mode all --stacktrace --info ==="
        ./gradlew testDebugUnitTest \
          --no-daemon \
          --console=plain \
          --warning-mode all \
          --stacktrace \
          --info \
          2>&1 | tee test-full-output.log

        echo ""
        echo "=== RESUMEN DE ERRORES Y WARNINGS ==="
        echo "Errores encontrados:"
        grep -i "error" test-full-output.log || echo "No se encontraron errores"
        echo ""
        echo "Warnings encontrados:"
        grep -i "warning" test-full-output.log || echo "No se encontraron warnings"
        echo ""
        echo "Deprecated features:"
        grep -i "deprecated" test-full-output.log || echo "No se encontraron deprecated"
        echo ""
        echo "=== FIN DEL RESUMEN ==="

    # 5.5 Diagnóstico: Verificar dónde se generaron los reports
    - name: 🔍 Diagnosticar Reports de Tests
      if: always()
      run: |
        echo "=== DIAGNÓSTICO: BUSCANDO REPORTS DE TESTS ==="

        echo -e "\n📂 Buscando en app/build/test-results/:"
        find app/build/test-results/ -name "*.xml" -type f 2>/dev/null | head -20 || echo "❌ No encontrado"

        echo -e "\n📂 Buscando en app/build/reports/tests/:"
        find app/build/reports/tests/ -type f 2>/dev/null | head -20 || echo "❌ No encontrado"

        echo -e "\n📂 Todos los XML de tests en el proyecto:"
        find . -name "TEST-*.xml" -type f 2>/dev/null | head -20 || echo "❌ No se encontraron XMLs"

        echo -e "\n📂 Estructura de test-results:"
        ls -laR app/build/test-results/ 2>/dev/null | head -50 || echo "❌ app/build/test-results/ no existe"

        echo -e "\n📂 Estructura de reports/tests:"
        ls -laR app/build/reports/tests/ 2>/dev/null | head -50 || echo "❌ app/build/reports/tests/ no existe"

    # 6. Subir reporte de tests como artifact
    - name: Subir Reporte de Tests (HTML)
      if: always()
      uses: actions/upload-artifact@v6.0.0  # ✅ Node.js 24
      with:
        name: test-results-html
        path: |
          app/build/reports/tests/**
        retention-days: 7
        if-no-files-found: warn  # ✅ Warn en lugar de error

    # 7. Subir logs de texto de los tests (XML)
    - name: Subir Logs de Tests (XML)
      if: always()
      uses: actions/upload-artifact@v6.0.0  # ✅ Node.js 24
      with:
        name: test-logs-xml
        path: |
          app/build/test-results/**/TEST-*.xml
        retention-days: 7
        if-no-files-found: warn  # ✅ Warn en lugar de error

    # 8. Subir log completo con TODOS los warnings y errores
    - name: Subir Log Completo (Verbose)
      if: always()
      uses: actions/upload-artifact@v6.0.0  # ✅ Node.js 24
      with:
        name: test-full-output-log
        path: test-full-output.log
        retention-days: 7
