name: Tests Unitarios

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]

jobs:
  test:
    name: Ejecutar Tests Unitarios
    runs-on: ubuntu-latest
    
    steps:
    # 1. Descargar código del repositorio
    - name: Checkout del código
      uses: actions/checkout@v5

    # 2. Configurar Java 17
    - name: Configurar JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Cache de dependencias de Gradle (acelera builds futuros)
    - name: Cache de Gradle
      uses: actions/cache@v5
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          gradle-${{ runner.os }}-
          
    # 4. Dar permisos de ejecución al Gradle Wrapper
    - name: Dar permisos a Gradle Wrapper
      run: chmod +x gradlew
      
    # 5. Ejecutar tests unitarios
    - name: Ejecutar Tests Unitarios
      run: ./gradlew test --no-daemon --console=plain
      
    # 6. Subir reporte de tests como artifact
    - name: Subir Reporte de Tests
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: test-results-html
        path: app/build/reports/tests/testDebugUnitTest/
        retention-days: 7

    # 7. Subir logs de texto de los tests
    - name: Subir Logs de Tests
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: test-logs
        path: app/build/test-results/
        retention-days: 7
