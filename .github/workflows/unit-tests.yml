name: Tests Unitarios

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]

jobs:
  test:
    name: Ejecutar Tests Unitarios
    runs-on: ubuntu-latest
    
    steps:
    # 1. Descargar código del repositorio
    - name: Checkout del código
      uses: actions/checkout@v5

    # 2. Configurar Java 17
    - name: Configurar JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Cache de dependencias de Gradle (acelera builds futuros)
    - name: Cache de Gradle
      uses: actions/cache@v5
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          gradle-${{ runner.os }}-
          
    # 4. Dar permisos de ejecución al Gradle Wrapper
    - name: Dar permisos a Gradle Wrapper
      run: chmod +x gradlew
      
    # 5. Ejecutar tests unitarios CON TODOS LOS WARNINGS Y ERRORES
    - name: Ejecutar Tests Unitarios (Verbose)
      run: |
        echo "=== INICIANDO TESTS CON TODOS LOS WARNINGS Y ERRORES ==="
        echo "Gradle version: $(./gradlew --version | grep Gradle)"
        echo ""
        echo "=== Ejecutando tests con --warning-mode all --stacktrace --info ==="
        ./gradlew test \
          --no-daemon \
          --console=plain \
          --warning-mode all \
          --stacktrace \
          --info \
          2>&1 | tee test-full-output.log
        
        echo ""
        echo "=== RESUMEN DE ERRORES Y WARNINGS ==="
        echo "Errores encontrados:"
        grep -i "error" test-full-output.log || echo "No se encontraron errores"
        echo ""
        echo "Warnings encontrados:"
        grep -i "warning" test-full-output.log || echo "No se encontraron warnings"
        echo ""
        echo "Deprecated features:"
        grep -i "deprecated" test-full-output.log || echo "No se encontraron deprecated"
        echo ""
        echo "=== FIN DEL RESUMEN ==="
      
    # 6. Subir reporte de tests como artifact
    - name: Subir Reporte de Tests
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-html
        path: app/build/reports/tests/testDebugUnitTest/
        retention-days: 7

    # 7. Subir logs de texto de los tests
    - name: Subir Logs de Tests
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-logs
        path: app/build/test-results/
        retention-days: 7

    # 8. Subir log completo con TODOS los warnings y errores
    - name: Subir Log Completo (Verbose)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-full-output-log
        path: test-full-output.log
        retention-days: 7
