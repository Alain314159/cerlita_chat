name: Strict CI

# Strict workflow - fails on ANY warning
# Only runs on pushes to main/develop (not PRs)

on:
  push:
    branches: [ main, develop ]

env:
  JAVA_VERSION: '17'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GRADLE_OPTS: >
    -Dorg.gradle.daemon=false
    -Dorg.gradle.jvmargs=-Xmx8g

jobs:
  # JOB 1: Strict Quality (fails on ANY issue)
  strict-quality:
    name: 🔒 Strict Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: gradle

    - uses: ./.github/actions/setup-gradle
      with:
        supabase-url: ${{ secrets.SUPABASE_URL }}
        supabase-anon-key: ${{ secrets.SUPABASE_ANON_KEY }}

    - name: 🔎 Detekt (STRICT)
      run: ./gradlew detekt

    - name: 📝 KtLint (STRICT)
      run: ./gradlew ktlintCheck

    - name: 🔎 Android Lint (STRICT)
      run: ./gradlew lintDebug --warning-mode all

  # JOB 2: Strict Build
  strict-build:
    name: 🔒 Strict Build
    runs-on: ubuntu-latest
    needs: strict-quality

    steps:
    - uses: actions/checkout@v5

    - uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: gradle

    - name: 🤖 Setup Android SDK
      uses: android-actions/setup-android@v3

    - uses: ./.github/actions/setup-gradle
      with:
        supabase-url: ${{ secrets.SUPABASE_URL }}
        supabase-anon-key: ${{ secrets.SUPABASE_ANON_KEY }}

    - name: 🔨 Build Debug (STRICT)
      run: |
        ./gradlew assembleDebug \
          --no-daemon \
          --console=plain \
          --warning-mode all

    - name: 📤 Upload APK
      uses: actions/upload-artifact@v6
      with:
        name: strict-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

  # JOB 3: Strict Tests
  strict-tests:
    name: 🔒 Strict Tests
    runs-on: ubuntu-latest
    needs: strict-build

    steps:
    - uses: actions/checkout@v5

    - uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: gradle

    - uses: ./.github/actions/setup-gradle
      with:
        supabase-url: ${{ secrets.SUPABASE_URL }}
        supabase-anon-key: ${{ secrets.SUPABASE_ANON_KEY }}

    - name: 🧪 Unit Tests (STRICT)
      run: ./gradlew testDebugUnitTest --no-daemon --console=plain

    - name: 📊 Publish Test Results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        files: |
          app/build/test-results/test/**/*.xml
          app/build/test-results/testDebugUnitTest/**/*.xml
        check_name: Strict Test Results
        comment_mode: always
        fail_on: test failures

    - name: 📤 Upload Test Reports
      uses: actions/upload-artifact@v6
      if: always()
      with:
        name: strict-test-reports
        path: |
          app/build/reports/tests/testDebugUnitTest/**
          app/build/test-results/testDebugUnitTest/**
        retention-days: 7

  # JOB 4: Final Report
  strict-report:
    name: 📋 Report
    runs-on: ubuntu-latest
    needs: [strict-quality, strict-build, strict-tests]
    if: always()

    steps:
    - name: 📊 Generate Summary
      run: |
        STATUS="✅ PASSED"
        if [ "${{ needs.strict-quality.result }}" != "success" ] || \
           [ "${{ needs.strict-build.result }}" != "success" ] || \
           [ "${{ needs.strict-tests.result }}" != "success" ]; then
          STATUS="❌ FAILED"
        fi

        echo "# 🔒 Strict CI - $STATUS" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Strict Quality | ${{ needs.strict-quality.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Strict Build | ${{ needs.strict-build.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Strict Tests | ${{ needs.strict-tests.result }} |" >> $GITHUB_STEP_SUMMARY
