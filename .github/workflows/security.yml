name: 🛡️ Security Audit 2026

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0' # Ejecutar cada domingo a medianoche

jobs:
  security-audit:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔍 NPM Audit
        working-directory: cerlita_chat
        run: npm audit --audit-level=high

      - name: 🛡️ Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true # No queremos bloquear el CI por falsos positivos sin revisión
