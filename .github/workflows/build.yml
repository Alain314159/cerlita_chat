name: Production Pipeline 2026

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Cancelar ejecuciones previas si se hace un nuevo push en la misma rama/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: 🛡️ Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: cerlita_chat/package-lock.json

      - name: 📦 Install Dependencies
        working-directory: cerlita_chat
        run: npm ci

      - name: 🔎 Expo Doctor
        working-directory: cerlita_chat
        run: npx expo-doctor

      - name: 🧹 Lint
        working-directory: cerlita_chat
        run: npm run lint

      - name: ⌨️ Type Check
        working-directory: cerlita_chat
        run: npm run typecheck

      - name: 🧪 Unit Tests
        working-directory: cerlita_chat
        run: npm test

  deploy-web:
    name: 🌐 Deploy Web
    needs: quality-gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: cerlita_chat/package-lock.json

      - name: 📦 Install Dependencies
        working-directory: cerlita_chat
        run: npm ci

      - name: 🏗️ Build Web
        working-directory: cerlita_chat
        run: npm run build:web

      - name: 🔧 Post Build Patch
        run: node post-build.js

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./cerlita_chat/dist
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

  build-mobile:
    name: 📱 EAS Build Preview
    needs: quality-gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: cerlita_chat/package-lock.json

      - name: 📦 Install Dependencies
        working-directory: cerlita_chat
        run: npm ci

      - name: 🏗️ Setup Expo/EAS
        if: env.EXPO_TOKEN != null
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🚀 Trigger EAS Build
        if: env.EXPO_TOKEN != null
        working-directory: cerlita_chat
        run: npx eas build --platform android --profile preview --non-interactive --no-wait
