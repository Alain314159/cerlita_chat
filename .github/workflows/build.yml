name: Master Build Workflow

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Type Check (Informative)
        run: npx tsc --noEmit || echo "Typescript errors ignored for build"

      - name: Build Web
        run: npx expo export --platform web

      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

      - name: Setup Expo/EAS
        if: env.EXPO_TOKEN != null && env.EXPO_TOKEN != ''
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (APK)
        if: env.EXPO_TOKEN != null && env.EXPO_TOKEN != ''
        run: |
          npx eas build --platform android --profile preview --non-interactive --no-wait
