name: Build Android and Web

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: cerlita_chat/package-lock.json

      - name: Install dependencies
        run: cd cerlita_chat && npm install

      - name: Build Web
        run: cd cerlita_chat && npx expo export --platform web

      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: cerlita_chat/dist

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: cerlita_chat/package-lock.json

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: cd cerlita_chat && npm install

      - name: Build Android APK (Preview)
        run: |
          cd cerlita_chat
          # Nota: Requiere configuración previa de EAS
          # npx eas build --platform android --profile preview --local --non-interactive
