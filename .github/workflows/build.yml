name: Master Build Workflow

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cerlita_chat
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: cerlita_chat/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Type Check (Informative)
        run: npx tsc --noEmit || echo "Typescript errors ignored for build"

      - name: Build Web
        run: npx expo export --platform web

      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: cerlita_chat/dist

      - name: Setup Expo/EAS
        if: ${{ secrets.EXPO_TOKEN != '' }}
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (APK)
        if: ${{ secrets.EXPO_TOKEN != '' }}
        run: |
          npm install -g eas-cli
          # npx eas build --platform android --profile preview --local --non-interactive
          echo "Build Android step reached"
