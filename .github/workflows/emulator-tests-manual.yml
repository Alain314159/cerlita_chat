name: Tests en Emulador (Manual)

# ⚠️ ESTE WORKFLOW SOLO SE EJECUTA MANUALMENTE
# No se activa con push/PR automáticamente

on:
  workflow_dispatch:
    inputs:
      api-level:
        description: 'Android API Level para el emulador'
        required: true
        default: '30'
        type: choice
        options:
          - '26'
          - '27'
          - '28'
          - '29'
          - '30'
          - '31'
          - '32'
          - '33'
          - '34'
      test-type:
        description: 'Tipo de tests a ejecutar'
        required: true
        default: 'connectedAndroidTest'
        type: choice
        options:
          - connectedAndroidTest
          - connectedDebugAndroidTest
      timeout-minutes:
        description: 'Tiempo máximo de ejecución en minutos'
        required: true
        default: '30'
        type: number

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Forzar Node.js 24 para testing

jobs:
  emulator-test:
    name: Tests en Emulador Android
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes || 30 }}

    steps:
    # 1. Descargar código
    - name: Checkout del código
      uses: actions/checkout@v4.2.0  # ✅ Node.js 24

    # 2. Configurar Java 17
    - name: Configurar JDK 17
      uses: actions/setup-java@v4.0.0  # ✅ Node.js 24
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Cache de Gradle
    - name: Cache de Gradle
      uses: actions/cache@v5  # ✅ Node.js 24
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-emulator-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          gradle-emulator-${{ runner.os }}-
          
    # 4. Habilitar KVM para emulador más rápido
    - name: Habilitar KVM
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm
        
    # 5. Ejecutar tests en emulador
    - name: Ejecutar Tests en Emulador
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: ${{ inputs.api-level || 30 }}
        target: google_apis
        arch: x86_64
        profile: Nexus 6
        ram-size: 2048M
        heap-size: 512M
        sdcard-path-or-size: 100M
        script: ./gradlew ${{ inputs.test-type || 'connectedDebugAndroidTest' }} --no-daemon --console=plain
        
    # 6. Subir reporte de tests
    - name: Subir Reporte de Tests
      if: always()
      uses: actions/upload-artifact@v6.0.0  # ✅ Node.js 24
      with:
        name: emulator-test-results
        path: app/build/reports/androidTests/

    # 7. Subir logs
    - name: Subir Logs de Tests
      if: always()
      uses: actions/upload-artifact@v6.0.0  # ✅ Node.js 24
      with:
        name: emulator-test-logs
        path: app/build/outputs/androidTest-results/

    # 8. Subir screenshots (si hay tests que toman screenshots)
    - name: Subir Screenshots
      if: always()
      uses: actions/upload-artifact@v6.0.0  # ✅ Node.js 24
      with:
        name: emulator-screenshots
        path: app/build/outputs/connected_android_test_additional_output/
        if-no-files-found: ignore
