name: Android CI - Build & Verify

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Permite ejecutar manualmente

env:
  JAVA_VERSION: '21'  # Actualizado a Java 21 (2026)
  GRADLE_OPTS: >
    -Dorg.gradle.jvmargs=-Xmx8g
    -Dorg.gradle.daemon=false
    --no-daemon
    --stacktrace
    --info
    -Dkotlin.incremental=false

jobs:
  # ============================================
  # JOB 1: VALIDACIÓN DE CÓDIGO (Lint + Detekt)
  # ============================================
  code-quality:
    name: 🔍 Code Quality Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Historial completo para análisis
        lfs: true  # Soporte para Git LFS

    - name: Setup Java ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4  # Actualizado a v4 (2026)
      with:
        gradle-version: wrapper
        cache-read-only: false

    - name: Cache Gradle dependencies
      uses: actions/cache@v4  # Actualizado a v4 (2026)
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.android/build-cache
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    # 1.1 Detekt (Análisis estático Kotlin)
    - name: 🔎 Run Detekt Analysis
      continue-on-error: true  # No falla el workflow pero reporta errores
      run: |
        echo "=== INICIANDO DETEKT (Análisis estático Kotlin) ==="
        ./gradlew detekt --info --stacktrace 2>&1 | tee detekt-report.log
        echo "=== DETEKT COMPLETADO ==="
        
        # Verificar si existe el reporte
        if [ -f "build/reports/detekt/detekt.html" ]; then
          echo "✅ Reporte HTML generado: build/reports/detekt/detekt.html"
        fi
        if [ -f "build/reports/detekt/detekt.xml" ]; then
          echo "✅ Reporte XML generado para GitHub"
          # Contar errores
          ERROR_COUNT=$(grep -o 'error' build/reports/detekt/detekt.xml | wc -l)
          echo "🚨 Total errores/warnings Detekt: $ERROR_COUNT"
        fi

    # 1.2 Android Lint
    - name: 🔎 Run Android Lint
      continue-on-error: true
      run: |
        echo "=== INICIANDO ANDROID LINT ==="
        ./gradlew lintDebug --info --stacktrace 2>&1 | tee lint-report.log
        
        echo "=== RESULTADOS LINT ==="
        if [ -d "app/build/reports/lint-results-debug.html" ]; then
          echo "📄 Reporte HTML disponible"
          # Extraer resumen de errores
          grep -A 5 "Lint Error" app/build/reports/lint-results-debug.xml || echo "No se encontraron errores críticos en XML"
        fi

    # 1.3 KtLint (Formato de código)
    - name: 📝 Check Code Format (KtLint)
      continue-on-error: true
      run: |
        echo "=== VERIFICANDO FORMATO KOTLIN ==="
        ./gradlew ktlintCheck --info 2>&1 | tee ktlint-report.log || true
        
        if grep -q "FAILED" ktlint-report.log; then
          echo "⚠️  Errores de formato encontrados. Ejecuta ./gradlew ktlintFormat para corregir automáticamente"
          cat ktlint-report.log
        fi

    # 1.4 Dependency Check (Vulnerabilidades)
    - name: 🔒 Dependency Vulnerability Scan
      continue-on-error: true
      run: |
        echo "=== ANALIZANDO DEPENDENCIAS ==="
        ./gradlew dependencyCheckAnalyze --info 2>&1 | tee dependency-report.log || true

    # Subir reportes como artifacts
    - name: 📤 Upload Quality Reports
      uses: actions/upload-artifact@v4
      if: always()  # Subir aunque falle
      with:
        name: code-quality-reports
        path: |
          **/build/reports/detekt/
          **/build/reports/lint-results-*.html
          **/build/reports/lint-results-*.xml
          **/ktlint-report.log
          **/detekt-report.log
          **/lint-report.log
        retention-days: 30

  # ============================================
  # JOB 2: COMPILACIÓN Y TESTS
  # ============================================
  build-and-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    needs: code-quality  # Espera al análisis de calidad
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Setup Java ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Cache Gradle
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    # Verificar estructura del proyecto
    - name: 📁 Verify Project Structure
      run: |
        echo "=== ESTRUCTURA DEL PROYECTO ==="
        echo "Directorio raíz:"
        ls -la
        
        echo -e "\n📂 Archivos Gradle:"
        find . -name "*.gradle*" -type f | head -20
        
        echo -e "\n📂 Módulos encontrados:"
        ./gradlew projects --info 2>&1 | grep "Project " || true
        
        echo -e "\n📂 Dependencias configuradas:"
        ./gradlew dependencies --configuration implementation 2>&1 | head -50 || true

    # Verificar secretos (sin exponerlos)
    - name: 🔐 Check Configuration Files
      run: |
        echo "=== VERIFICANDO CONFIGURACIÓN ==="
        
        # Verificar que existe SupabaseConfig (sin mostrar valores)
        if grep -q "SUPABASE_URL" app/src/main/java/com/example/messageapp/supabase/SupabaseConfig.kt 2>/dev/null; then
          echo "✅ SupabaseConfig.kt encontrado"
          # Verificar que no están los placeholders
          if grep -q "TU_PROYECTO.supabase.co" app/src/main/java/com/example/messageapp/supabase/SupabaseConfig.kt; then
            echo "⚠️  ADVERTENCIA: Aún están los placeholders de Supabase. Configura los secrets."
          else
            echo "✅ Supabase parece estar configurado"
          fi
        else
          echo "❌ ERROR: No se encontró SupabaseConfig.kt"
        fi
        
        # Verificar AndroidManifest
        if [ -f "app/src/main/AndroidManifest.xml" ]; then
          echo "✅ AndroidManifest.xml presente"
        else
          echo "❌ ERROR: Falta AndroidManifest.xml"
        fi

    # Compilar Debug (con logs detallados)
    - name: 🔨 Build Debug APK (Verbose)
      run: |
        echo "=== INICIANDO COMPILACIÓN DEBUG ==="
        echo "Java Version: $(java -version 2>&1 | head -1)"
        echo "Gradle Version: $(./gradlew --version | grep Gradle)"
        
        ./gradlew clean assembleDebug --info --stacktrace --scan 2>&1 | tee build-debug.log
        
        echo "=== RESULTADO COMPILACIÓN DEBUG ==="
        if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          echo "✅ APK Debug generado exitosamente"
          ls -lh app/build/outputs/apk/debug/app-debug.apk
          echo "📊 Tamaño: $(du -h app/build/outputs/apk/debug/app-debug.apk | cut -f1)"
        else
          echo "❌ ERROR: No se generó el APK Debug"
          echo "Buscando APKs generados:"
          find . -name "*.apk" -type f 2>/dev/null || echo "No se encontraron APKs"
          exit 1
        fi

    # Ejecutar tests unitarios
    - name: 🧪 Run Unit Tests
      continue-on-error: true
      run: |
        echo "=== EJECUTANDO TESTS UNITARIOS ==="
        ./gradlew testDebugUnitTest --info --stacktrace 2>&1 | tee test-results.log
        
        echo "=== RESULTADOS TESTS ==="
        if [ -d "app/build/test-results" ]; then
          echo "✅ Tests completados. Reportes disponibles en app/build/test-results"
          find app/build/test-results -name "*.xml" -exec echo "📄 {}" \;
        fi

    # Compilar Release (si hay signing config)
    - name: 🔐 Build Release APK (si es posible)
      continue-on-error: true
      run: |
        echo "=== INTENTANDO COMPILACIÓN RELEASE ==="
        
        # Verificar si existe keystore o configuración de firma
        if [ -f "app/keystore.jks" ] || grep -q "storeFile" app/build.gradle.kts 2>/dev/null; then
          echo "✅ Configuración de firma encontrada"
          ./gradlew assembleRelease --info --stacktrace 2>&1 | tee build-release.log
          
          if [ -f "app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            echo "⚠️  APK Release sin firmar generado"
          elif [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
            echo "✅ APK Release firmado generado"
          fi
        else
          echo "⚠️  No se encontró configuración de firma. Solo se generará Debug."
          echo "Para Release, configura signingConfig en build.gradle.kts"
        fi

    # Análisis de APK (tamaño, contenido)
    - name: 📊 Analyze APK Structure
      run: |
        echo "=== ANÁLISIS DEL APK ==="
        if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          # Mostrar contenido
          echo "📦 Contenido del APK:"
          unzip -l app/build/outputs/apk/debug/app-debug.apk | tail -20
          
          echo -e "\n📏 Tamaño por tipo de archivo:"
          unzip -l app/build/outputs/apk/debug/app-debug.apk | awk '{print $4}' | grep -E "\.(dex|so|xml|png|jpg|webp|ttf|otf)$" | sort | uniq -c | sort -rn | head -10
        fi

    # Subir APK Debug
    - name: 📤 Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
        if-no-files-found: error

    # Subir APK Release (si existe)
    - name: 📤 Upload Release APK (if exists)
      uses: actions/upload-artifact@v4
      if: hashFiles('app/build/outputs/apk/release/*.apk') != ''
      with:
        name: app-release-apk
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30

    # Subir logs de compilación
    - name: 📤 Upload Build Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-logs
        path: |
          **/build-debug.log
          **/build-release.log
          **/test-results.log
        retention-days: 30

  # ============================================
  # JOB 3: VERIFICACIÓN FINAL Y REPORTE
  # ============================================
  final-report:
    name: 📋 Final Report
    runs-on: ubuntu-latest
    needs: [code-quality, build-and-test]
    if: always()  # Ejecutar siempre para reportar estado
    
    steps:
    - name: 📊 Generate Summary
      run: |
        echo "# 📱 Reporte de Compilación Android" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        echo "## 🎯 Estado de los Jobs" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Estado |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Build & Test | ${{ needs.build-and-test.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        echo "## 📥 Descargas Disponibles" >> $GITHUB_STEP_SUMMARY
        echo "- APK Debug: Disponible en artifacts (app-debug-apk)" >> $GITHUB_STEP_SUMMARY
        echo "- Reportes de calidad: Disponibles en artifacts (code-quality-reports)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        echo "## ⚠️ Notas Importantes" >> $GITHUB_STEP_SUMMARY
        echo "- Si hay errores de Lint o Detekt, revisa el artifact 'code-quality-reports'" >> $GITHUB_STEP_SUMMARY
        echo "- El APK Debug está listo para instalar en dispositivos Android" >> $GITHUB_STEP_SUMMARY
        echo "- Para Release, configura el keystore en secrets del repositorio" >> $GITHUB_STEP_SUMMARY
