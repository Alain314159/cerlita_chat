build:
  maxIssues: 50
  weights:
    complexity: 2
    formatting: 1
    LongParameterList: 1

complexity:
  ComplexCondition:
    active: true
  ComplexMethod:
    active: true
    threshold: 15
  NestedBlockDepth:
    active: true
    threshold: 4
  TooManyFunctions:
    active: true
    thresholdInFiles: 20
    thresholdInClasses: 15
    thresholdInInterfaces: 10
    thresholdInObjects: 10

style:
  MaxLineLength:
    active: true
    maxLineLength: 120
  UnusedPrivateMember:
    active: true
  WildcardImport:
    active: true
    excludeImports: []
  MagicNumber:
    active: false
  ReturnCount:
    active: true
    max: 3
    excludedFunctions: ['equals']
  ThrowsCount:
    active: true
    max: 3

performance:
  SpreadOperator:
    active: false

exceptions:
  SwallowedException:
    active: true
  TooGenericExceptionCaught:
    active: true
    excludeExceptionTypes:
      - Exception

formatting:
  active: true
  Indentation:
    active: true
    indentSize: 4
  MaximumLineLength:
    active: true
    maxLineLength: 120
  TrailingWhitespace:
    active: true
  NoWildcardImports:
    active: false
  ImportOrdering:
    active: false
  Filename:
    active: false
